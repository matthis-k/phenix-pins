name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto

      - name: Configure devenv cache
        uses: cachix/cachix-action@v17
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Run repository maintenance
        id: maintenance
        shell: bash
        run: |
          set +e
          devenv test > devenv-test.log 2>&1
          status=$?
          tail -n 240 devenv-test.log
          exit "$status"

      - name: Capture formatter output
        if: failure()
        shell: bash
        run: |
          devenv tasks run maintenance:fix:format
          git diff -- devenv.nix maintenance.nix modules/package.nix > nixfmt.patch

      - name: Upload devenv diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devenv-test-log
          path: |
            devenv-test.log
            nixfmt.patch
          if-no-files-found: error
