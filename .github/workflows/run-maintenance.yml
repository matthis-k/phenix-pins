name: Run queued maintenance

on:
  pull_request:

permissions:
  contents: write

jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Execute queued maintenance script
        shell: bash
        run: |
          set -uo pipefail
          rm -f .maintenance-failure.log
          python3 -m pip install --quiet pyyaml
          set +e
          python3 - <<'PY' 2>&1 | tee /tmp/maintenance.log
          import subprocess, yaml
          data = yaml.safe_load(open('.github/workflows/migrate-caretaker.yml'))
          for step in data['jobs']['migrate']['steps']:
              script = step.get('run')
              if script:
                  subprocess.run(script, shell=True, executable='/bin/bash', check=True)
          PY
          status=${PIPESTATUS[0]}
          set -e
          if (( status != 0 )); then
            git reset --hard HEAD
            git clean -fdx
            tail -n 240 /tmp/maintenance.log > .maintenance-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .maintenance-failure.log
            git commit -m "ci: capture caretaker migration failure"
            git push origin main
            exit "$status"
          fi
      - name: Remove maintenance trigger
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/run-maintenance.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: remove temporary maintenance trigger"
          git push origin main
