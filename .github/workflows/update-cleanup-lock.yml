name: Update cleanup lock

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - cleanup/tend-v2-bootstrap

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update pins graph
        run: nix flake update
      - name: Commit generated lock through GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          current_sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/flake.lock?ref=$BRANCH" --jq .sha)"
          content="$(base64 -w0 flake.lock)"
          gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/flake.lock" \
            -f message='chore: update pins lock graph' \
            -f content="$content" \
            -f sha="$current_sha" \
            -f branch="$BRANCH"
